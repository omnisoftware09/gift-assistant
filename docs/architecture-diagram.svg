<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: bold; fill: #1a1a2e; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #555; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .box-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #ffffff; }
      .box-text-dark { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #333; }
      .layer-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: bold; fill: #888; letter-spacing: 1px; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#fafafa"/>

  <text x="600" y="40" text-anchor="middle" class="title">Gift Assistant - System Architecture</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle">Slack | LangGraph | ChromaDB | MCP | Multi-Agent</text>

  <!-- INTERFACE -->
  <text x="40" y="95" class="layer-label">INTERFACE</text>
  <rect x="150" y="80" width="900" height="70" rx="8" fill="#4A154B" stroke="#3a0f3b" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" class="box-title">Slack Interface</text>
  <text x="600" y="128" text-anchor="middle" class="box-text">DMs | Mentions | /gift | /events | /ecard | Alert Buttons</text>
  <text x="600" y="142" text-anchor="middle" class="box-text">Socket Mode | Block Kit | unfurl_links=false</text>
  <line x1="600" y1="150" x2="600" y2="175" class="arrow"/>

  <!-- ORCHESTRATOR -->
  <text x="40" y="195" class="layer-label">ROUTING</text>
  <rect x="200" y="180" width="800" height="60" rx="8" fill="#2d6a4f" stroke="#1b4332" stroke-width="2"/>
  <text x="600" y="205" text-anchor="middle" class="box-title">Orchestrator</text>
  <text x="600" y="225" text-anchor="middle" class="box-text">Intent routing | Session management | Recipient handoff</text>
  <line x1="600" y1="240" x2="600" y2="265" class="arrow"/>

  <!-- SUB-AGENTS -->
  <text x="40" y="285" class="layer-label">SUB-AGENTS</text>

  <rect x="80" y="270" width="240" height="100" rx="8" fill="#1d3557" stroke="#14213d" stroke-width="2"/>
  <text x="200" y="295" text-anchor="middle" class="box-title">Gift Recommender</text>
  <text x="200" y="315" text-anchor="middle" class="box-text">LangGraph Pipeline</text>
  <text x="200" y="332" text-anchor="middle" class="box-text">search - evaluate</text>
  <text x="200" y="347" text-anchor="middle" class="box-text">rank - verify</text>

  <rect x="340" y="270" width="240" height="100" rx="8" fill="#457b9d" stroke="#1d3557" stroke-width="2"/>
  <text x="460" y="295" text-anchor="middle" class="box-title">Profile Collector</text>
  <text x="460" y="315" text-anchor="middle" class="box-text">ReAct Agent</text>
  <text x="460" y="332" text-anchor="middle" class="box-text">save | query | delete</text>
  <text x="460" y="347" text-anchor="middle" class="box-text">Chroma profiles</text>

  <rect x="600" y="270" width="240" height="100" rx="8" fill="#457b9d" stroke="#1d3557" stroke-width="2"/>
  <text x="720" y="295" text-anchor="middle" class="box-title">Event Monitor</text>
  <text x="720" y="315" text-anchor="middle" class="box-text">Calendar queries</text>
  <text x="720" y="332" text-anchor="middle" class="box-text">Proactive worker</text>
  <text x="720" y="347" text-anchor="middle" class="box-text">(every 6h scan)</text>

  <rect x="860" y="270" width="240" height="100" rx="8" fill="#457b9d" stroke="#1d3557" stroke-width="2"/>
  <text x="980" y="295" text-anchor="middle" class="box-title">eCard Generator</text>
  <text x="980" y="315" text-anchor="middle" class="box-text">LLM copy + image</text>
  <text x="980" y="332" text-anchor="middle" class="box-text">Slack file upload</text>

  <line x1="200" y1="370" x2="200" y2="420" class="arrow"/>
  <line x1="460" y1="370" x2="460" y2="420" class="arrow"/>
  <line x1="720" y1="370" x2="720" y2="420" class="arrow"/>

  <!-- MEMORY -->
  <text x="40" y="445" class="layer-label">MEMORY</text>
  <rect x="80" y="430" width="1020" height="90" rx="8" fill="#e9c46a" stroke="#f4a261" stroke-width="2"/>
  <text x="590" y="455" text-anchor="middle" class="box-title" fill="#1a1a2e">Memory and Data Layer</text>

  <rect x="100" y="468" width="220" height="42" rx="4" fill="#fff" stroke="#f4a261"/>
  <text x="210" y="485" text-anchor="middle" class="box-text-dark" font-weight="bold">Gift Sessions</text>
  <text x="210" y="500" text-anchor="middle" class="box-text-dark">JSON - feedback, iteration</text>

  <rect x="340" y="468" width="220" height="42" rx="4" fill="#fff" stroke="#f4a261"/>
  <text x="450" y="485" text-anchor="middle" class="box-text-dark" font-weight="bold">Gift History</text>
  <text x="450" y="500" text-anchor="middle" class="box-text-dark">SQLite - past gifts, age</text>

  <rect x="580" y="468" width="220" height="42" rx="4" fill="#fff" stroke="#f4a261"/>
  <text x="690" y="485" text-anchor="middle" class="box-text-dark" font-weight="bold">Profiles</text>
  <text x="690" y="500" text-anchor="middle" class="box-text-dark">ChromaDB - interests</text>

  <rect x="820" y="468" width="220" height="42" rx="4" fill="#fff" stroke="#f4a261"/>
  <text x="930" y="485" text-anchor="middle" class="box-text-dark" font-weight="bold">Notifications</text>
  <text x="930" y="500" text-anchor="middle" class="box-text-dark">JSON - alert state</text>

  <line x1="600" y1="520" x2="600" y2="555" class="arrow"/>

  <!-- TOOLS -->
  <text x="40" y="575" class="layer-label">TOOLS</text>
  <rect x="80" y="560" width="1020" height="100" rx="8" fill="#264653" stroke="#1d3557" stroke-width="2"/>
  <text x="590" y="585" text-anchor="middle" class="box-title">Tools and MCP Layer</text>

  <rect x="100" y="598" width="180" height="50" rx="4" fill="#2a9d8f"/>
  <text x="190" y="620" text-anchor="middle" class="box-text" font-weight="bold">Exa MCP</text>
  <text x="190" y="638" text-anchor="middle" class="box-text">Discovery (HTTP)</text>

  <rect x="300" y="598" width="180" height="50" rx="4" fill="#2a9d8f"/>
  <text x="390" y="620" text-anchor="middle" class="box-text" font-weight="bold">SerpApi MCP</text>
  <text x="390" y="638" text-anchor="middle" class="box-text">Google Shopping</text>

  <rect x="500" y="598" width="180" height="50" rx="4" fill="#2a9d8f"/>
  <text x="590" y="620" text-anchor="middle" class="box-text" font-weight="bold">Rainforest MCP</text>
  <text x="590" y="638" text-anchor="middle" class="box-text">Amazon (stdio)</text>

  <rect x="700" y="598" width="180" height="50" rx="4" fill="#2a9d8f"/>
  <text x="790" y="620" text-anchor="middle" class="box-text" font-weight="bold">Google Calendar</text>
  <text x="790" y="638" text-anchor="middle" class="box-text">API (read-only)</text>

  <rect x="900" y="598" width="180" height="50" rx="4" fill="#2a9d8f"/>
  <text x="990" y="620" text-anchor="middle" class="box-text" font-weight="bold">Chroma Tools</text>
  <text x="990" y="638" text-anchor="middle" class="box-text">Profile CRUD</text>

  <!-- PIPELINE -->
  <text x="40" y="705" class="layer-label">PIPELINE</text>
  <rect x="80" y="690" width="1020" height="80" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <text x="590" y="715" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a1a2e">Gift Recommender Pipeline (LangGraph)</text>

  <rect x="100" y="728" width="115" height="32" rx="4" fill="#1d3557"/>
  <text x="157" y="749" text-anchor="middle" class="box-text">1. SEARCH</text>
  <text x="230" y="749" font-family="Arial" font-size="16" fill="#666">&gt;</text>

  <rect x="245" y="728" width="115" height="32" rx="4" fill="#1d3557"/>
  <text x="302" y="749" text-anchor="middle" class="box-text">2. EVALUATE</text>
  <text x="375" y="749" font-family="Arial" font-size="16" fill="#666">&gt;</text>

  <rect x="390" y="728" width="115" height="32" rx="4" fill="#1d3557"/>
  <text x="447" y="749" text-anchor="middle" class="box-text">3. RANK</text>
  <text x="520" y="749" font-family="Arial" font-size="16" fill="#666">&gt;</text>

  <rect x="535" y="728" width="115" height="32" rx="4" fill="#1d3557"/>
  <text x="592" y="749" text-anchor="middle" class="box-text">4. VERIFY</text>
  <text x="665" y="749" font-family="Arial" font-size="16" fill="#666">&gt;</text>

  <rect x="680" y="728" width="200" height="32" rx="4" fill="#e76f51"/>
  <text x="780" y="749" text-anchor="middle" class="box-text">Human: Pick / Refine / Done</text>

  <text x="920" y="749" font-family="Arial" font-size="11" fill="#666">70% closeness + 30% rating</text>

  <!-- LEGEND -->
  <rect x="80" y="790" width="1020" height="90" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="100" y="815" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Key Design Choices</text>
  <text x="100" y="838" font-family="Arial" font-size="11" fill="#555">- Fixed LangGraph pipeline (not open ReAct) - predictable, debuggable, cost-controlled</text>
  <text x="100" y="855" font-family="Arial" font-size="11" fill="#555">- MCP tools called programmatically - gift LLM focuses on ideas, not tool selection</text>
  <text x="100" y="872" font-family="Arial" font-size="11" fill="#555">- Human-in-the-loop - system proposes, user picks 1/2/3 or refines with feedback</text>
  <text x="620" y="838" font-family="Arial" font-size="11" fill="#555">- Discovery (Exa) separate from verification (Rainforest)</text>
  <text x="620" y="855" font-family="Arial" font-size="11" fill="#555">- Guardrails: no-repeat prompts, circuit breaker, VERIFY_TOP_N</text>
  <text x="620" y="872" font-family="Arial" font-size="11" fill="#555">- Observability: logging + LangSmith tracing</text>

</svg>
